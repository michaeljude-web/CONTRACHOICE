<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ContraChoice — Sidebar UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f1f0ec;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-muted: #a0a09b;
    --blue-50: #e6f1fb;
    --blue-100: #b5d4f4;
    --blue-600: #185FA5;
    --blue-800: #0C447C;
    --blue-900: #042C53;
    --purple-50: #eeedfe;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --green-50: #eaf3de;
    --green-800: #27500A;
    --red-50: #fcebeb;
    --red-700: #791F1F;
    --amber-50: #faeeda;
    --amber-800: #633806;
    --sidebar-w: 240px;
  }

  html, body {
    height: 100%;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
  }

  /* ─── Layout ─── */
  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--surface);
    border-right: 0.5px solid var(--border-md);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.25s ease;
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .logo-wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .logo-wordmark em { font-style: italic; color: var(--blue-600); }
  .logo-tagline {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  .sidebar-nav {
    flex: 1;
    padding: 10px 10px;
    overflow-y: auto;
  }

  .nav-section {
    margin-top: 6px;
    margin-bottom: 2px;
  }
  .nav-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 6px 8px 4px;
    display: block;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 1px;
    transition: background 0.12s;
    text-decoration: none;
    color: var(--text-secondary);
    position: relative;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text-primary); }
  .nav-item:hover .nav-icon svg path,
  .nav-item:hover .nav-icon svg rect,
  .nav-item:hover .nav-icon svg circle { stroke: var(--text-primary); }

  .nav-item.active {
    background: var(--blue-50);
    color: var(--blue-800);
  }
  .nav-item.active .nav-icon svg path,
  .nav-item.active .nav-icon svg rect,
  .nav-item.active .nav-icon svg circle { stroke: var(--blue-600); }
  .nav-item.active .nav-label { font-weight: 500; color: var(--blue-800); }

  .nav-item.active-admin {
    background: var(--purple-50);
    color: var(--purple-800);
  }
  .nav-item.active-admin .nav-icon svg path,
  .nav-item.active-admin .nav-icon svg rect,
  .nav-item.active-admin .nav-icon svg circle { stroke: var(--purple-600); }
  .nav-item.active-admin .nav-label { font-weight: 500; color: var(--purple-800); }

  .nav-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-label { font-size: 13px; flex: 1; line-height: 1; }

  .nav-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-red { background: var(--red-50); color: var(--red-700); }
  .badge-green { background: var(--green-50); color: var(--green-800); }

  /* ─── Sidebar footer ─── */
  .sidebar-footer {
    border-top: 0.5px solid var(--border);
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .user-chip:hover { background: var(--surface2); }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .avatar-user { background: var(--blue-50); color: var(--blue-800); }
  .avatar-admin { background: var(--purple-50); color: var(--purple-800); }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text-muted); }

  .logout-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    border: none;
    background: none;
    width: 100%;
    color: #A32D2D;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
  }
  .logout-btn:hover { background: var(--red-50); }

  /* ─── Main content area ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .topbar {
    height: 52px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border-md);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .topbar-sep { color: var(--text-muted); font-size: 13px; }
  .topbar-page { font-size: 13px; color: var(--text-secondary); }

  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-role-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .role-user { background: var(--blue-50); color: var(--blue-800); }
  .role-admin { background: var(--purple-50); color: var(--purple-800); }

  /* role switcher (demo only) */
  .role-switcher {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .rs-btn {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-md);
    background: none;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    color: var(--text-secondary);
    transition: all 0.12s;
  }
  .rs-btn:hover { background: var(--surface2); }
  .rs-btn.on-user { background: var(--blue-50); border-color: var(--blue-600); color: var(--blue-800); font-weight: 500; }
  .rs-btn.on-admin { background: var(--purple-50); border-color: var(--purple-600); color: var(--purple-800); font-weight: 500; }

  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px;
  }

  /* ─── Content placeholder ─── */
  .page-header { margin-bottom: 24px; }
  .page-heading { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text-primary); margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text-secondary); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-val { font-size: 26px; font-weight: 500; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text-secondary); }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 12px; }
  .skeleton { height: 10px; border-radius: 5px; background: var(--border); margin-bottom: 8px; }
  .sk-full { width: 100%; }
  .sk-med { width: 72%; }
  .sk-short { width: 44%; }

  .rec-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .rec-item:last-child { border-bottom: none; }
  .rec-rank {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--blue-50);
    color: var(--blue-800);
    font-size: 12px;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .rec-rank-admin { background: var(--purple-50); color: var(--purple-800); }
  .rec-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .rec-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .rec-pct {
    margin-left: auto;
    font-size: 12px;
    font-weight: 500;
    color: #27500A;
    background: var(--green-50);
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  /* animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .sidebar, .main { animation: fadeIn 0.25s ease both; }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-wordmark"><em>Contra</em>Choice</div>
      <div class="logo-tagline" id="sidebar-tagline">Women's Health Information</div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- rendered by JS -->
    </nav>

    <div class="sidebar-footer" id="sidebar-footer">
      <!-- rendered by JS -->
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="topbar-title">ContraChoice</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-page" id="topbar-page">Dashboard</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-role-badge" id="role-badge">User</span>
        <div class="role-switcher">
          <button class="rs-btn on-user" id="btn-user" onclick="setRole('user')">User view</button>
          <button class="rs-btn" id="btn-admin" onclick="setRole('admin')">Admin view</button>
        </div>
      </div>
    </div>

    <div class="content-area" id="content-area">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<script>
const ROLES = {
  user: {
    tagline: "Women's Health Information",
    badgeClass: "role-user",
    badgeText: "User",
    avatarClass: "avatar-user",
    initials: "MR",
    name: "Maria Reyes",
    roleLabel: "Student · SEAIT",
    nav: [
      { section: "Main" },
      { id: "dashboard", label: "Dashboard", active: true, icon: "grid" },
      { id: "questionnaire", label: "Questionnaire", icon: "list-search" },
      { id: "comparison", label: "Comparison guide", icon: "compare" },
      { id: "recommendations", label: "My recommendations", icon: "star" },
      { section: "Community" },
      { id: "forum", label: "Anonymous forum", icon: "chat" },
      { id: "chatbot", label: "AI chatbot", icon: "bot" },
      { section: "Account" },
      { id: "profile", label: "My profile", icon: "user" },
      { id: "history", label: "History", icon: "clock" },
    ]
  },
  admin: {
    tagline: "Admin panel",
    badgeClass: "role-admin",
    badgeText: "Admin",
    avatarClass: "avatar-admin",
    initials: "AD",
    name: "Administrator",
    roleLabel: "System administrator",
    nav: [
      { section: "Overview" },
      { id: "dashboard", label: "Dashboard", active: true, icon: "grid", adminActive: true },
      { id: "analytics", label: "Analytics", icon: "analytics" },
      { section: "Content" },
      { id: "methods", label: "Manage methods", icon: "compare" },
      { id: "qstats", label: "Questionnaire stats", icon: "list-search" },
      { id: "chatresponses", label: "Chatbot responses", icon: "bot" },
      { section: "Moderation" },
      { id: "forum-mod", label: "Forum moderation", icon: "chat", badge: "5", badgeType: "red" },
      { id: "reports", label: "Reported posts", icon: "flag", badge: "2", badgeType: "red" },
      { section: "System" },
      { id: "settings", label: "Settings", icon: "settings" },
      { id: "accounts", label: "User accounts", icon: "users" },
    ]
  }
};

const ICONS = {
  grid: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>`,
  "list-search": `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="13" cy="12" r="2" stroke="currentColor" stroke-width="1.1"/></svg>`,
  compare: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="5.5" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="3" width="5.5" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M7 8h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  star: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.6 3.2L13 6l-2.5 2.4.6 3.6L8 10.2 4.9 12l.6-3.6L3 6l3.4-.8L8 2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
  chat: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3h12v8H8l-3 3v-3H2V3z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
  bot: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 13l1.5-1.5h3L11 13" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="8" r="1" fill="currentColor"/><circle cx="10" cy="8" r="1" fill="currentColor"/></svg>`,
  user: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2.5 13.5c0-2.5 2.5-4 5.5-4s5.5 1.5 5.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  clock: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  analytics: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 13l3.5-4 3 2.5L12 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="5" r="1.5" stroke="currentColor" stroke-width="1.1"/></svg>`,
  flag: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2v12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M4 3h8l-2 3.5 2 3.5H4" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
  settings: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M8 2v1M8 13v1M2 8h1M13 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M3.5 12.5l.7-.7M11.8 4.2l.7-.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
  users: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 13c0-2 2-3.5 4.5-3.5S10.5 11 10.5 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="11.5" cy="5" r="1.8" stroke="currentColor" stroke-width="1.1"/><path d="M13.5 12.5c0-1.8-1-3-2.5-3.2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>`,
  logout: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3H3.5A1.5 1.5 0 002 4.5v7A1.5 1.5 0 003.5 13H6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
};

let currentRole = 'user';
let activeNav = 'dashboard';

function setRole(role) {
  currentRole = role;
  activeNav = 'dashboard';
  renderAll();
  document.getElementById('btn-user').className = 'rs-btn' + (role === 'user' ? ' on-user' : '');
  document.getElementById('btn-admin').className = 'rs-btn' + (role === 'admin' ? ' on-admin' : '');
}

function setNav(id, label) {
  activeNav = id;
  document.getElementById('topbar-page').textContent = label;
  renderNav();
  renderContent();
}

function renderAll() {
  const r = ROLES[currentRole];
  document.getElementById('sidebar-tagline').textContent = r.tagline;
  const badge = document.getElementById('role-badge');
  badge.className = 'topbar-role-badge ' + r.badgeClass;
  badge.textContent = r.badgeText;
  document.getElementById('topbar-page').textContent = 'Dashboard';
  renderNav();
  renderFooter();
  renderContent();
}

function renderNav() {
  const r = ROLES[currentRole];
  const isAdmin = currentRole === 'admin';
  let html = '';
  r.nav.forEach(item => {
    if (item.section) {
      html += `<div class="nav-section"><span class="nav-section-label">${item.section}</span></div>`;
      return;
    }
    const isActive = activeNav === item.id;
    const activeClass = isActive ? (isAdmin ? 'active-admin' : 'active') : '';
    const badge = item.badge ? `<span class="nav-badge badge-${item.badgeType || 'red'}">${item.badge}</span>` : '';
    html += `<div class="nav-item ${activeClass}" onclick="setNav('${item.id}', '${item.label}')">
      <span class="nav-icon">${ICONS[item.icon] || ''}</span>
      <span class="nav-label">${item.label}</span>
      ${badge}
    </div>`;
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

function renderFooter() {
  const r = ROLES[currentRole];
  const isAdmin = currentRole === 'admin';
  document.getElementById('sidebar-footer').innerHTML = `
    <div class="user-chip">
      <div class="avatar ${r.avatarClass}">${r.initials}</div>
      <div class="user-info">
        <div class="user-name">${r.name}</div>
        <div class="user-role">${r.roleLabel}</div>
      </div>
    </div>
    <button class="logout-btn">
      <span class="nav-icon" style="color:#A32D2D;">${ICONS.logout}</span>
      Mag-logout
    </button>
  `;
}

function renderContent() {
  const isAdmin = currentRole === 'admin';
  const area = document.getElementById('content-area');

  if (activeNav === 'dashboard' && !isAdmin) {
    area.innerHTML = `
      <div class="page-header">
        <div class="page-heading">Maligayang pagdating, Maria</div>
        <div class="page-sub">Narito ang iyong personalized na kalusugan na impormasyon ngayon.</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val">3</div><div class="stat-label">Mga rekomendasyon</div></div>
        <div class="stat-card"><div class="stat-val">2</div><div class="stat-label">Nai-save na paraan</div></div>
        <div class="stat-card"><div class="stat-val">1</div><div class="stat-label">Forum posts mo</div></div>
      </div>
      <div class="card">
        <div class="card-title">Iyong pinakabagong rekomendasyon</div>
        <div class="rec-item"><div class="rec-rank">1</div><div><div class="rec-name">IUD (Copper)</div><div class="rec-sub">Non-hormonal · 99% effective</div></div><div class="rec-pct">99%</div></div>
        <div class="rec-item"><div class="rec-rank">2</div><div><div class="rec-name">Implant</div><div class="rec-sub">Hormonal · 3 taon</div></div><div class="rec-pct">99%</div></div>
        <div class="rec-item"><div class="rec-rank">3</div><div><div class="rec-name">Hormonal IUD</div><div class="rec-sub">Mababang hormones · 3–8 taon</div></div><div class="rec-pct">97%</div></div>
      </div>
      <div class="card">
