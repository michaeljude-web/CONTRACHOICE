<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContraChoice - Black & Pink Logo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: rgb(195, 200, 200);
        }
        .mylogo-wrapper {
            display: inline-block;
            text-align: center;
            line-height: 1;
            font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
        }

        .mylogo-brand {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            display: inline-block;
        }

        .mylogo-contra {
            font-style: italic;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #343232; /* solid black */
        }

        .mylogo-choice {
            font-weight: 900;
            color: #ba485b; /* clear pink */
        }

        .mylogo-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 0.4rem;
        }

        .mylogo-line {
            width: 60px;
            height: 1.5px;
            background: #f4c1cc; /* soft pink line */
            opacity: 0.9;
        }

        .mylogo-diamond {
            width: 7px;
            height: 7px;
            background: #d36e7e; /* pink diamond to match */
            transform: rotate(45deg);
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div class="mylogo-wrapper">
        <div class="mylogo-brand">
            <span class="mylogo-contra">Contra</span><span class="mylogo-choice">Choice</span>
        </div>
        <div class="mylogo-divider">
            <span class="mylogo-line"></span>
            <span class="mylogo-diamond"></span>
            <span class="mylogo-line"></span>
        </div>
    </div>
</body>
</html>
