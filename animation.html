<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContraChoice - Logo Art</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --deep-blue: #1a3a5c;
            --crimson: #c0392b;
            --gold: #d4a853;
            --silver: #b0b8c1;
            --white: #f0ece4;
            --teal-accent: #1abc9c;
            --shadow-1: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d0d 70%, #050510 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }

        /* Subtle animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(212, 168, 83, 0.15);
            animation: floatUp 12s infinite ease-in;
        }

        .particle:nth-child(1) {
            width: 4px;
            height: 4px;
            left: 15%;
            bottom: -10%;
            animation-delay: 0s;
            animation-duration: 14s;
        }
        .particle:nth-child(2) {
            width: 3px;
            height: 3px;
            left: 30%;
            bottom: -10%;
            animation-delay: 3s;
            animation-duration: 11s;
            background: rgba(26, 188, 156, 0.2);
        }
        .particle:nth-child(3) {
            width: 5px;
            height: 5px;
            left: 55%;
            bottom: -10%;
            animation-delay: 6s;
            animation-duration: 15s;
        }
        .particle:nth-child(4) {
            width: 3px;
            height: 3px;
            left: 72%;
            bottom: -10%;
            animation-delay: 2s;
            animation-duration: 10s;
            background: rgba(192, 57, 43, 0.2);
        }
        .particle:nth-child(5) {
            width: 4px;
            height: 4px;
            left: 85%;
            bottom: -10%;
            animation-delay: 8s;
            animation-duration: 13s;
        }
        .particle:nth-child(6) {
            width: 2px;
            height: 2px;
            left: 48%;
            bottom: -10%;
            animation-delay: 5s;
            animation-duration: 16s;
            background: rgba(176, 184, 193, 0.25);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            30% {
                transform: translateY(-35vh) translateX(30px) scale(1.5);
                opacity: 0.6;
            }
            60% {
                transform: translateY(-70vh) translateX(-25px) scale(0.8);
                opacity: 0.3;
            }
            100% {
                transform: translateY(-105vh) translateX(15px) scale(0.2);
                opacity: 0;
            }
        }

        /* Main logo container */
        .logo-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            animation: entranceReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes entranceReveal {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* The emblem mark */
        .emblem {
            position: relative;
            width: 220px;
            height: 220px;
            cursor: default;
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.5));
            transition: filter 0.6s ease, transform 0.6s ease;
        }

        .emblem:hover {
            filter: drop-shadow(0 25px 60px rgba(212, 168, 83, 0.35));
            transform: translateY(-4px);
        }

        /* Outer ring */
        .outer-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 4px solid transparent;
            background: conic-gradient(from 0deg,
                    var(--crimson) 0deg,
                    var(--crimson) 35deg,
                    var(--gold) 35deg,
                    var(--gold) 55deg,
                    transparent 55deg,
                    transparent 125deg,
                    var(--teal-accent) 125deg,
                    var(--teal-accent) 145deg,
                    var(--deep-blue) 145deg,
                    var(--deep-blue) 215deg,
                    transparent 215deg,
                    transparent 305deg,
                    var(--silver) 305deg,
                    var(--silver) 325deg,
                    var(--crimson) 325deg,
                    var(--crimson) 360deg) border-box;
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
            animation: rotateRing 20s linear infinite;
        }

        @keyframes rotateRing {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Inner circle background */
        .inner-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 185px;
            height: 185px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #1e2a3a 0%, #0f1923 60%, #080e15 100%);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.7), 0 0 30px rgba(26, 58, 92, 0.3);
            overflow: hidden;
        }

        /* Glow accent inside */
        .inner-circle::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(ellipse at 50% 30%, rgba(26, 188, 156, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(192, 57, 43, 0.06) 0%, transparent 55%);
            pointer-events: none;
        }

        /* The central icon: two opposing arrows forming a split path */
        .icon-arrows {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
            z-index: 2;
        }

        /* Left arrow (pointing up-left) */
        .arrow-left {
            position: absolute;
            top: 50%;
            left: 25%;
            transform: translate(-50%, -50%) rotate(-35deg);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-bottom: 48px solid var(--crimson);
            filter: drop-shadow(0 0 14px rgba(192, 57, 43, 0.7));
            transition: filter 0.4s ease, border-bottom-color 0.4s ease;
            animation: pulseCrimson 2.8s ease-in-out infinite;
        }

        @keyframes pulseCrimson {
            0%,
            100% {
                filter: drop-shadow(0 0 14px rgba(192, 57, 43, 0.7));
            }
            50% {
                filter: drop-shadow(0 0 28px rgba(192, 57, 43, 0.95));
            }
        }

        .arrow-left-stem {
            position: absolute;
            top: calc(50% + 18px);
            left: calc(25% - 4px);
            transform: translate(-50%, -50%) rotate(-35deg);
            width: 8px;
            height: 36px;
            background: var(--crimson);
            border-radius: 4px;
            filter: drop-shadow(0 0 10px rgba(192, 57, 43, 0.6));
            animation: pulseCrimson 2.8s ease-in-out infinite;
        }

        /* Right arrow (pointing down-right) */
        .arrow-right {
            position: absolute;
            top: 50%;
            left: 75%;
            transform: translate(-50%, -50%) rotate(145deg);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-bottom: 48px solid var(--teal-accent);
            filter: drop-shadow(0 0 14px rgba(26, 188, 156, 0.7));
            transition: filter 0.4s ease, border-bottom-color 0.4s ease;
            animation: pulseTeal 2.8s ease-in-out infinite;
            animation-delay: 0.7s;
        }

        @keyframes pulseTeal {
            0%,
            100% {
                filter: drop-shadow(0 0 14px rgba(26, 188, 156, 0.7));
            }
            50% {
                filter: drop-shadow(0 0 28px rgba(26, 188, 156, 0.95));
            }
        }

        .arrow-right-stem {
            position: absolute;
            top: calc(50% - 16px);
            left: calc(75% - 4px);
            transform: translate(-50%, -50%) rotate(145deg);
            width: 8px;
            height: 36px;
            background: var(--teal-accent);
            border-radius: 4px;
            filter: drop-shadow(0 0 10px rgba(26, 188, 156, 0.6));
            animation: pulseTeal 2.8s ease-in-out infinite;
            animation-delay: 0.7s;
        }

        /* Central diamond/choice node */
        .choice-node {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 28px;
            height: 28px;
            background: var(--gold);
            border-radius: 3px;
            z-index: 3;
            box-shadow: 0 0 25px rgba(212, 168, 83, 0.9), 0 0 50px rgba(212, 168, 83, 0.4), inset 0 0 8px rgba(255, 255, 255, 0.3);
            animation: glowNode 2s ease-in-out infinite;
        }

        @keyframes glowNode {
            0%,
            100% {
                box-shadow: 0 0 25px rgba(212, 168, 83, 0.9), 0 0 50px rgba(212, 168, 83, 0.4);
            }
            50% {
                box-shadow: 0 0 40px rgba(212, 168, 83, 1), 0 0 75px rgba(212, 168, 83, 0.7), 0 0 100px rgba(255, 200, 50, 0.4);
            }
        }

        /* Small inner dot in node */
        .choice-node::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 12px #fff, 0 0 25px rgba(255, 255, 255, 0.8);
        }

        /* Subtle crosshair lines */
        .crosshair-h,
        .crosshair-v {
            position: absolute;
            background: rgba(176, 184, 193, 0.25);
            z-index: 1;
            pointer-events: none;
        }
        .crosshair-h {
            top: 50%;
            left: 8%;
            width: 84%;
            height: 1px;
            transform: translateY(-50%);
        }
        .crosshair-v {
            left: 50%;
            top: 8%;
            height: 84%;
            width: 1px;
            transform: translateX(-50%);
        }

        /* Wordmark */
        .wordmark {
            text-align: center;
            z-index: 2;
        }

        .brand-name {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 0.06em;
            color: var(--white);
            text-transform: uppercase;
            line-height: 1;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 40px rgba(240, 236, 228, 0.3);
        }

        .brand-name .contra {
            color: #e8e0d0;
            position: relative;
        }

        .brand-name .choice {
            color: var(--gold);
            position: relative;
        }

        /* Decorative line under wordmark */
        .wordmark-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
        }

        .wordmark-line .line {
            width: 55px;
            height: 2px;
            background: var(--gold);
            border-radius: 1px;
            opacity: 0.7;
        }

        .wordmark-line .diamond-sm {
            width: 8px;
            height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
            border-radius: 1px;
            box-shadow: 0 0 10px rgba(212, 168, 83, 0.7);
        }

        /* Tagline */
        .tagline {
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--silver);
            margin-top: 4px;
            opacity: 0.7;
            font-weight: 400;
        }

        /* Subtle orbiting dot */
        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            animation: orbit 8s linear infinite;
            box-shadow: 0 0 12px rgba(212, 168, 83, 0.8);
            z-index: 4;
            pointer-events: none;
        }

        @keyframes orbit {
            0% {
                transform: rotate(0deg) translateX(108px) rotate(0deg);
            }
            100% {
                transform: rotate(360deg) translateX(108px) rotate(-360deg);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .emblem {
                width: 160px;
                height: 160px;
            }
            .outer-ring {
                width: 152px;
                height: 152px;
            }
            .inner-circle {
                width: 132px;
                height: 132px;
            }
            .icon-arrows {
                width: 80px;
                height: 80px;
            }
            .arrow-left,
            .arrow-right {
                border-left-width: 16px;
                border-right-width: 16px;
                border-bottom-width: 34px;
            }
            .arrow-left-stem,
            .arrow-right-stem {
                width: 6px;
                height: 24px;
            }
            .arrow-left-stem {
                top: calc(50% + 12px);
                left: calc(25% - 3px);
            }
            .arrow-right-stem {
                top: calc(50% - 10px);
                left: calc(75% - 3px);
            }
            .choice-node {
                width: 22px;
                height: 22px;
            }
            .choice-node::after {
                width: 7px;
                height: 7px;
            }
            .brand-name {
                font-size: 2.2rem;
            }
            .orbit-dot {
                animation: orbit 8s linear infinite;
            }
            @keyframes orbit {
                0% {
                    transform: rotate(0deg) translateX(80px) rotate(0deg);
                }
                100% {
                    transform: rotate(360deg) translateX(80px) rotate(-360deg);
                }
            }
            .crosshair-h {
                left: 6%;
                width: 88%;
            }
            .crosshair-v {
                top: 6%;
                height: 88%;
            }
        }

        @media (max-width: 380px) {
            .emblem {
                width: 130px;
                height: 130px;
            }
            .outer-ring {
                width: 124px;
                height: 124px;
            }
            .inner-circle {
                width: 106px;
                height: 106px;
            }
            .icon-arrows {
                width: 65px;
                height: 65px;
            }
            .arrow-left,
            .arrow-right {
                border-left-width: 12px;
                border-right-width: 12px;
                border-bottom-width: 26px;
            }
            .arrow-left-stem,
            .arrow-right-stem {
                width: 5px;
                height: 18px;
            }
            .arrow-left-stem {
                top: calc(50% + 8px);
                left: calc(25% - 2px);
            }
            .arrow-right-stem {
                top: calc(50% - 6px);
                left: calc(75% - 2px);
            }
            .choice-node {
                width: 18px;
                height: 18px;
            }
            .choice-node::after {
                width: 5px;
                height: 5px;
            }
            .brand-name {
                font-size: 1.6rem;
            }
            .orbit-dot {
                animation: orbitSmall 8s linear infinite;
            }
            @keyframes orbitSmall {
                0% {
                    transform: rotate(0deg) translateX(64px) rotate(0deg);
                }
                100% {
                    transform: rotate(360deg) translateX(64px) rotate(-360deg);
                }
            }
            .crosshair-h {
                left: 4%;
                width: 92%;
            }
            .crosshair-v {
                top: 4%;
                height: 92%;
            }
        }
    </style>
</head>
<body>

    <!-- Background particles -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Logo -->
    <div class="logo-container">
        <!-- Emblem -->
        <div class="emblem">
            <div class="outer-ring"></div>
            <div class="inner-circle">
                <div class="crosshair-h"></div>
                <div class="crosshair-v"></div>
                <div class="icon-arrows">
                    <div class="arrow-left"></div>
                    <div class="arrow-left-stem"></div>
                    <div class="arrow-right"></div>
                    <div class="arrow-right-stem"></div>
                    <div class="choice-node"></div>
                </div>
            </div>
            <div class="orbit-dot"></div>
        </div>

        <!-- Wordmark -->
        <div class="wordmark">
            <div class="brand-name">
                <span class="contra">Contra</span><span class="choice">Choice</span>
            </div>
            <div class="wordmark-line">
                <span class="line"></span>
                <span class="diamond-sm"></span>
                <span class="line"></span>
            </div>
            <div class="tagline">Opposing Paths &middot; Defining Decisions</div>
        </div>
    </div>

</body>
</html>
